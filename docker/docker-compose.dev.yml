services:
  api:
    build:
      context: ..
      target: dev
      dockerfile: ./docker/backend/Dockerfile.dev
    ports:
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ../api:/usr/src
      - ./backend/Caddyfile:/usr/src/Caddyfile
#      - hls_data:/usr/src/public/hls
      - recordings:/usr/src/public/recordings
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - all
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - all

#  queue:
#    build:
#      context: ..
#      target: worker
#      dockerfile: ./docker/backend/Dockerfile.dev
#    depends_on:
#      - db
#    volumes:
#      - ../api:/usr/src
#    networks:
#      - all

  migrate:
    build:
      context: ..
      target: migrate
      dockerfile: ./docker/backend/Dockerfile.dev
    restart: no
    volumes:
      - ../api:/usr/src
    depends_on:
      - db
    networks:
      - all

  mediamtx:
#    image: bluenviron/mediamtx:latest-ffmpeg
    build:
      context: ..
      dockerfile: ./docker/mediamtx/Dockerfile
    ports:
      - "1935:1935"
#      - "8888:8888"
#      - "9997:9997" // only local using
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
#      - hls_data:/data/hls
      - recordings:/recordings
    networks:
      - all

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - all

#  frontend:
#    image: nodejs

networks:
  all:
    driver: bridge

volumes:
  db_data:
#  hls_data:
  caddy_data:
  caddy_config:
  recordings: